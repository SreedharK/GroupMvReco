<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade-Off Table</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        
        <header class="app-header">
            <div class="header-titles">
                <h1>Trade-Off Table</h1>
                <p>Negotiate group movie choices with scarce tokens.</p>
            </div>
            <div class="fairness-control">
                <label for="fairnessDial" class="dial-label">Aggregation Rule</label>
                <div class="slider-container">
                    <span class="slider-label">Utilitarian<br>(Max Happiness)</span>
                    <input type="range" id="fairnessDial" min="0" max="1" step="0.01" value="0.5">
                    <span class="slider-label">Rawlsian<br>(Protect Least Satisfied)</span>
                </div>
            </div>
        </header>

        <main class="app-main">
            <!-- Left Side: Movie Grid -->
            <section class="movie-board-section">
                <h2>Candidate Films</h2>
                <div class="movie-grid" id="movieGrid">
                    <!-- Movie cards rendered via JS -->
                </div>
            </section>

            <!-- Right Side: Consensus Panel -->
            <section class="consensus-panel-section">
                <h2>Live Shortlist</h2>
                <div class="consensus-list" id="consensusList">
                    <!-- Shortlist items rendered via JS -->
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <h2>Participant Trays</h2>
            <div class="trays-container" id="traysContainer">
                <!-- Trays rendered via JS -->
            </div>
        </footer>

    </div>

    <!-- Drag and Drop Polyfill/Library? No, we will use HTML5 Native Drag and Drop -->
    <script src="app.js"></script>
</body>
</html>
